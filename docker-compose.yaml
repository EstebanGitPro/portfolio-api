services:
  mongodb:
    image: mongo:7.0.4
    container_name: portfolio-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db

  portfolio-api:
    build: .
    container_name: portfolio-api
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:password@mongodb:27017/portfolio-db?authSource=admin
    depends_on:
      - mongodb

  mongodbatlas:
    image: mongodb/mongodb-atlas-local:latest
    container_name: mongodbatlas
    profiles:
      - atlas
    ports:
      - "27018:27017"

volumes:
  mongo_data:
